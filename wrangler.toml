# Cloudflare Workers + Static Assets config.
#
# This tells Cloudflare to serve the marketing site (./website) as a
# static-asset Worker. The chatbot product (./public) is NOT served
# from this Worker — it runs from the laptop via cloudflared tunnel
# (see docs/deploy-dunper-com.md).
#
# When the Cloudflare project is wired to Git auto-deploy, it picks
# up this file on every push and serves ./website as the site root.

name = "dunper-ai"
compatibility_date = "2024-10-01"

[assets]
directory = "./website"
not_found_handling = "single-page-application"

# Custom domains — auto-attached once dunper.com DNS is on Cloudflare.
# (If the domain isn't on this Cloudflare account yet, Cloudflare will
# silently skip these routes; once you swap nameservers at GoDaddy and
# Cloudflare detects the zone, the next push wires them up.)
[[routes]]
pattern = "dunper.com"
custom_domain = true

[[routes]]
pattern = "www.dunper.com"
custom_domain = true
