<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunper AI — Sign In</title>
<meta name="description" content="Sign in to your Dunper AI dashboard.">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://dunper.com/dunper_signin.html">
<meta name="theme-color" content="#0D1B2A">
<link rel="icon" type="image/png" href="/img/logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0D1B2A;--blue-mid:#2563A8;--blue-soft:#5B8ED4;
    --blue-pale:#A8C7F0;--white:#F0F6FF;--accent:#4FC3F7;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--navy);color:var(--white);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;
    overflow-x:hidden;
  }

  .bg-wrap{
    position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%,rgba(37,99,168,.22) 0%,transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 30%,rgba(27,58,107,.3) 0%,transparent 70%);
  }
  .bg-orb{position:absolute;border-radius:50%;filter:blur(100px);}
  .bg-orb.o1{width:500px;height:500px;top:-100px;left:-150px;background:rgba(37,99,168,.1);}
  .bg-orb.o2{width:400px;height:400px;bottom:-100px;right:-100px;background:rgba(79,195,247,.07);animation:pulse 6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

  .topbar{
    padding:20px 48px;display:flex;align-items:center;justify-content:space-between;
    flex-shrink:0;
  }
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;}
  .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue-mid),var(--accent));clip-path:polygon(50% 0%,95% 30%,80% 100%,20% 100%,5% 30%);}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;}
  .back-link{color:var(--blue-pale);text-decoration:none;font-size:14px;transition:color .2s;}
  .back-link:hover{color:var(--white);}

  .auth-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:24px 20px;
  }
  .auth-card{
    background:rgba(13,27,42,.7);
    border:1px solid rgba(91,142,212,.22);
    border-radius:28px;padding:44px 44px;
    width:100%;max-width:460px;
    backdrop-filter:blur(20px);
    animation:cardIn .7s ease both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .auth-tabs{display:flex;gap:0;margin-bottom:36px;border-bottom:1px solid rgba(91,142,212,.18);}
  .tab-btn{
    flex:1;padding:12px;background:none;border:none;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
    color:var(--blue-soft);border-bottom:2px solid transparent;
    margin-bottom:-1px;transition:color .2s,border-color .2s;
  }
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

  .tab-panel{display:none;}
  .tab-panel.active{display:flex;flex-direction:column;gap:18px;}

  .field{display:flex;flex-direction:column;gap:6px;}
  label{font-size:12px;color:var(--blue-pale);letter-spacing:.08em;text-transform:uppercase;}
  input[type=text],input[type=email],input[type=password]{
    background:rgba(27,58,107,.3);
    border:1px solid rgba(91,142,212,.25);
    border-radius:12px;padding:14px 16px;
    color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;
    outline:none;transition:border-color .25s,box-shadow .25s;width:100%;
  }
  input:focus{border-color:rgba(79,195,247,.5);box-shadow:0 0 0 3px rgba(79,195,247,.07);}
  input::placeholder{color:rgba(91,142,212,.5);}

  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  .forgot{text-align:right;margin-top:-8px;}
  .forgot a{font-size:13px;color:var(--blue-soft);text-decoration:none;transition:color .2s;}
  .forgot a:hover{color:var(--accent);}

  .submit-btn{
    background:linear-gradient(135deg,var(--blue-mid),var(--accent));
    color:white;border:none;cursor:pointer;
    padding:16px;border-radius:50px;width:100%;
    font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;
    transition:opacity .2s,transform .2s;margin-top:4px;
  }
  .submit-btn:hover{opacity:.85;transform:scale(1.01);}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

  .form-status{font-size:13px;text-align:center;min-height:18px;}
  .form-status.ok{color:#34d399;}
  .form-status.err{color:#f87171;}

  .divider{display:flex;align-items:center;gap:14px;color:rgba(91,142,212,.4);font-size:13px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(91,142,212,.18);}

  .social-btn{
    display:flex;align-items:center;justify-content:center;gap:12px;
    background:rgba(27,58,107,.25);border:1px solid rgba(91,142,212,.2);
    border-radius:12px;padding:13px;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:14px;color:var(--blue-pale);
    transition:border-color .2s,color .2s;
    width:100%;
  }
  .social-btn:hover{border-color:rgba(79,195,247,.3);color:var(--white);}
  .social-icon{font-size:18px;}

  .terms-note{font-size:12px;color:rgba(91,142,212,.55);text-align:center;line-height:1.6;}
  .terms-note a{color:var(--blue-soft);text-decoration:none;}
  .terms-note a:hover{color:var(--accent);}

  .join-link{text-align:center;font-size:14px;color:var(--blue-pale);}
  .join-link a{color:var(--accent);text-decoration:none;cursor:pointer;}
  .join-link a:hover{text-decoration:underline;}

  @media (max-width: 520px) {
    .auth-card { padding: 32px 22px; border-radius: 18px; }
    .field-row { grid-template-columns: 1fr; }
    .topbar { padding: 16px 20px; }
  }
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg-orb o1"></div>
  <div class="bg-orb o2"></div>
</div>

<header class="topbar">
  <a class="nav-logo" href="dunper_home.html">
    <div class="logo-icon"></div>
    <span class="logo-text">dunper</span>
  </a>
  <a class="back-link" href="dunper_home.html">← Back to Home</a>
</header>

<div class="auth-wrap">
  <div class="auth-card">

    <!-- TABS -->
    <div class="auth-tabs">
      <button type="button" class="tab-btn active" id="signinTab" onclick="switchTab('signin')">Log In</button>
      <button type="button" class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- SIGN IN PANEL -->
    <form class="tab-panel active" id="signinPanel" onsubmit="handleSignIn(event)">
      <div class="field">
        <label>Username or Email</label>
        <input type="text" id="signin-username" placeholder="you@company.com" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="••••••••" required/>
      </div>
      <div class="forgot"><a href="dunper_contact.html">Forgot password?</a></div>
      <button type="submit" class="submit-btn" id="signin-btn">Log In →</button>
      <p class="form-status" id="signin-status"></p>

      <div class="divider">or</div>
      <button type="button" class="social-btn" onclick="alert('Google sign-in coming soon. For now, contact us at dunperai@gmail.com.')"><span class="social-icon">G</span> Continue with Google</button>

      <div class="join-link">
        Don't have an account? <a onclick="switchTab('signup')">Sign up free</a>
      </div>
    </form>

    <!-- SIGN UP PANEL -->
    <form class="tab-panel" id="signupPanel" action="https://formsubmit.co/dunperai@gmail.com" method="POST" onsubmit="handleSignUp(event)">
      <input type="hidden" name="_subject" value="New Dunper sign-up request" />
      <input type="hidden" name="_captcha" value="true" />
      <input type="hidden" name="_template" value="table" />
      <div class="field-row">
        <div class="field"><label>First Name</label><input type="text" name="first_name" placeholder="Alex" required/></div>
        <div class="field"><label>Last Name</label><input type="text" name="last_name" placeholder="Rivera" required/></div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@company.com" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" name="password" placeholder="Min. 8 characters" minlength="8" required/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="signup-password-confirm" placeholder="Re-enter password" minlength="8" required/>
      </div>
      <button type="submit" class="submit-btn" id="signup-btn">Create Account →</button>
      <p class="form-status" id="signup-status"></p>

      <div class="divider">or</div>
      <button type="button" class="social-btn" onclick="alert('Google sign-up coming soon. For now, fill the form above.')"><span class="social-icon">G</span> Continue with Google</button>

      <div class="terms-note">
        By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. You must be 18 or older.
      </div>

      <div class="join-link">
        Already have an account? <a onclick="switchTab('signin')">Log in</a>
      </div>
    </form>

  </div>
</div>

<script>
  function switchTab(tab){
    document.getElementById('signinTab').classList.toggle('active', tab==='signin');
    document.getElementById('signupTab').classList.toggle('active', tab==='signup');
    document.getElementById('signinPanel').classList.toggle('active', tab==='signin');
    document.getElementById('signupPanel').classList.toggle('active', tab==='signup');
  }

  // Sign in: redirect to the actual chatbot product login (Cloudflare tunnel for now).
  // Edit this URL when you switch to a permanent named tunnel like app.dunper.com.
  const APP_LOGIN_URL = 'https://equally-logic-theta-mysql.trycloudflare.com/login.html';

  function handleSignIn(e) {
    e.preventDefault();
    const status = document.getElementById('signin-status');
    const btn = document.getElementById('signin-btn');
    btn.disabled = true;
    status.textContent = 'Redirecting to your dashboard…';
    status.className = 'form-status ok';
    setTimeout(() => { window.location.href = APP_LOGIN_URL; }, 600);
  }

  function handleSignUp(e) {
    e.preventDefault();
    const form = e.target;
    const pw = document.getElementById('signup-password').value;
    const pwc = document.getElementById('signup-password-confirm').value;
    const status = document.getElementById('signup-status');
    const btn = document.getElementById('signup-btn');

    if (pw !== pwc) {
      status.textContent = "Passwords don't match.";
      status.className = 'form-status err';
      return;
    }

    btn.disabled = true;
    status.textContent = 'Submitting…';
    status.className = 'form-status';

    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' },
    })
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      status.textContent = "Got it! We'll email you with onboarding details within 24 hours.";
      status.className = 'form-status ok';
      form.reset();
      setTimeout(() => { window.location.href = 'dunper_join.html'; }, 1500);
    })
    .catch(err => {
      status.textContent = `Couldn't submit — ${err.message}. Email us at dunperai@gmail.com.`;
      status.className = 'form-status err';
      btn.disabled = false;
    });
  }
</script>
</body>
</html>
