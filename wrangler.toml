# Cloudflare Workers + Static Assets config.
#
# This tells Cloudflare to serve the marketing site (./website) as a
# static-asset Worker. The chatbot product (./public) is NOT served
# from this Worker — it runs from the laptop via cloudflared tunnel
# (see docs/deploy-dunper-com.md).
#
# When the Cloudflare project is wired to Git auto-deploy, it picks
# up this file on every push and serves ./website as the site root.

name = "dunper-ai"
compatibility_date = "2024-10-01"

[assets]
directory = "./website"
# Dunper is a multi-page static site, not an SPA. With single-page-application
# mode Cloudflare returned the home page for any unknown URL — a typo like
# /dnper_about.html silently 200'd instead of 404'ing, which is bad for SEO
# and confuses users. Plain 404 is correct here.
not_found_handling = "none"

# dunper.com custom domain — NOT wired via wrangler.toml.
# Attempting to add [[routes]] here broke the entire deployment twice
# (build failed silently, every URL returned 404). The dunper.com zone
# is on Cloudflare but the wrangler.toml-based custom_domain mechanism
# doesn't seem to work for this project's setup.
#
# To wire dunper.com to this Worker: do it in the Cloudflare dashboard:
#   Workers & Pages → dunper-ai → Settings → Domains & Routes →
#   Add → "Custom domain" → dunper.com → Save
# Repeat for www.dunper.com.
# Cloudflare provisions SSL automatically (~30 seconds).
