<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Frontdesk</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="avatar">AI</div>
      <div class="header-text">
        <h1>Frontdesk Assistant</h1>
        <p class="status"><span class="dot"></span> Online</p>
      </div>
      <button type="button" id="open-booking-btn" class="book-btn">Book</button>
    </header>

    <main id="messages" class="messages" aria-live="polite"></main>

    <div id="attachment-preview" class="attachment-preview" hidden>
      <img id="attachment-preview-img" alt="Selected attachment" />
      <span id="attachment-preview-name"></span>
      <button type="button" id="attachment-preview-clear" aria-label="Remove attachment">×</button>
    </div>

    <form id="chat-form" class="chat-form" autocomplete="off">
      <input id="attachment-input" type="file" accept="image/jpeg,image/png,image/gif,image/webp" hidden />
      <button type="button" id="attachment-btn" class="attachment-btn" aria-label="Attach image">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57a4 4 0 0 1 5.66 5.66l-8.58 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <input
        id="chat-input"
        type="text"
        placeholder="Type your message..."
        autofocus
      />
      <button type="submit" id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>

  <div id="booking-modal" class="modal" hidden>
    <div class="modal-card">
      <header class="modal-head">
        <h2>Book an appointment</h2>
        <button type="button" class="modal-close" id="booking-close" aria-label="Close">×</button>
      </header>
      <form id="booking-form" class="modal-body">
        <label>
          <span>Service</span>
          <select id="booking-service" required></select>
        </label>
        <label>
          <span>Date</span>
          <input type="date" id="booking-date" required />
        </label>
        <div class="slots-wrap">
          <span class="slots-label">Available times</span>
          <div id="booking-slots" class="slots">
            <p class="hint">Pick a date to see times.</p>
          </div>
        </div>
        <div class="row-2">
          <label>
            <span>Your name</span>
            <input type="text" id="booking-name" required />
          </label>
          <label>
            <span>Phone</span>
            <input type="tel" id="booking-phone" required />
          </label>
        </div>
        <div class="modal-actions">
          <button type="submit" id="booking-submit" class="primary-btn" disabled>Confirm booking</button>
          <span id="booking-status" class="status"></span>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/chat.js"></script>
  <script src="/js/booking.js"></script>
</body>
</html>
